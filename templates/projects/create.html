{% extends 'base.html' %}
{% block create %}

<style>
    .form-container {
        display: flex;
        justify-content: center;
        padding: 40px;
        background: linear-gradient(135deg, #eef2ff, #f9fafb);
        min-height: 100vh;
    }

    .form-card {
        width: 70%;
        max-width: 800px;
        background: #fff;
        padding: 30px;
        border-radius: 15px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }

    .form-card h2 {
        text-align: center;
        margin-bottom: 20px;
        color: #333;
    }

    .form-group {
        margin-bottom: 15px;
        display: flex;
        flex-direction: column;
    }

    .form-group label {
        margin-bottom: 5px;
        font-weight: 600;
        color: #555;
    }

    .form-group input,
    .form-group textarea,
    .form-group select {
        padding: 10px;
        border-radius: 8px;
        border: 1px solid #ddd;
        outline: none;
        transition: 0.3s;
    }

    .form-group input:focus,
    .form-group textarea:focus,
    .form-group select:focus {
        border-color: #6366f1;
        box-shadow: 0 0 5px rgba(99,102,241,0.3);
    }

    textarea {
        resize: none;
        min-height: 100px;
    }

    .submit-btn {
        margin-top: 20px;
        padding: 12px;
        border: none;
        border-radius: 10px;
        background: linear-gradient(135deg, #6366f1, #8b5cf6);
        color: white;
        font-size: 16px;
        cursor: pointer;
        transition: 0.3s;
    }

    .submit-btn:hover {
        transform: scale(1.03);
        box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    }

    .image-preview {
        margin-top: 12px;
        max-width: 100%;
        border: 1px solid #e2e8f0;
        border-radius: 12px;
        overflow: hidden;
        background: #f8fafc;
    }
    .image-preview img {
        width: 100%;
        height: auto;
        display: block;
    }
    .form-status {
        margin-top: 18px;
        padding: 14px 18px;
        border-radius: 14px;
        font-weight: 600;
        display: none;
    }
    .form-status.success { background: #dcfce7; color: #166534; }
    .form-status.error { background: #fee2e2; color: #991b1b; }

    .flash-messages {
        margin-top: 20px;
    }

    .flash {
        background: #dcfce7;
        padding: 10px;
        border-radius: 8px;
        margin-bottom: 10px;
        display: flex;
        justify-content: space-between;
    }

    @media (max-width: 768px) {
        .form-card {
            width: 95%;
        }
    }
</style>

<div class="form-container">
    <form class="form-card" action="/project/create" method="POST" enctype="multipart/form-data">
        <h2>Create Your Project 🚀</h2>

        <div class="form-group">
            <label>Title</label>
            <input type="text" name="title" required placeholder="Enter project title">
        </div>

        <div class="form-group">
            <label>Category</label>
            <select name="select">
                <option value="">Select category</option>
                <option value="art">Art</option>
                <option value="technology">Technology</option>
                <option value="fashion">Fashion</option>
                <option value="design">Design</option>
                <option value="business">Business</option>
                <option value="music">Music</option>
                <option value="education">Education</option>
            </select>
        </div>

        <div class="form-group">
            <label>Short Description</label>
            <input type="text" name="short" placeholder="Brief summary of your project">
        </div>

        <div class="form-group">
            <label>Description</label>
            <textarea name="more" placeholder="Tell your story..."></textarea>
        </div>

        <div class="form-group">
            <label>Funding Goal (₦)</label>
            <input type="number" name="goal" placeholder="Enter amount needed">
        </div>

        <div class="form-group">
            <label>Project Image</label>
            <input type="file" name="image" accept="image/*">
            <div class="image-preview" id="imagePreview" style="display:none;"></div>
            <div class="form-status" id="formStatus"></div>
        </div>

        <div class="form-group">
            <label>Risks Involved</label>
            <textarea name="risks"></textarea>
        </div>

        <div class="form-group">
            <label>Rewards</label>
            <input type="text" name="reward" placeholder="What backers get">
        </div>

        <div class="form-group">
            <label>Deadline</label>
            <input type="date" name="end_date">
        </div>

        <button class="submit-btn" type="submit">Launch Project 🚀</button>

        {% with messages = get_flashed_messages() %}
        {% if messages %}
        <div class="flash-messages">
            {% for message in messages %}
            <div class="flash">
                {{ message }}
                <a href="#">X</a>
            </div>
            {% endfor %}
        </div>
        {% endif %}
        {% endwith %}
    </form>
</div>

<script>
    const createForm = document.querySelector('.form-card');
    const imageInput = document.querySelector('input[name="image"]');
    const imagePreview = document.getElementById('imagePreview');
    const formStatus = document.getElementById('formStatus');

    imageInput.addEventListener('change', function () {
        const file = this.files[0];
        if (!file) {
            imagePreview.style.display = 'none';
            imagePreview.innerHTML = '';
            return;
        }

        const reader = new FileReader();
        reader.onload = function (e) {
            imagePreview.style.display = 'block';
            imagePreview.innerHTML = `<img src="${e.target.result}" alt="Selected project image">`;
        };
        reader.readAsDataURL(file);
    });

    createForm.addEventListener('submit', function (event) {
        event.preventDefault();
        formStatus.style.display = 'none';
        formStatus.className = 'form-status';

        const data = new FormData(createForm);
        fetch(createForm.action, {
            method: 'POST',
            body: data,
            headers: {
                'X-Requested-With': 'XMLHttpRequest'
            }
        })
        .then(response => response.json())
        .then(result => {
            if (!result.success) {
                formStatus.classList.add('error');
                formStatus.textContent = result.message || 'Unable to submit project';
                formStatus.style.display = 'block';
                return;
            }
            formStatus.classList.add('success');
            formStatus.textContent = result.message || 'Project submitted successfully';
            formStatus.style.display = 'block';
            if (result.redirect) {
                setTimeout(() => {
                    window.location.href = result.redirect;
                }, 900);
            }
        })
        .catch(error => {
            formStatus.classList.add('error');
            formStatus.textContent = 'Upload failed. Please try again.';
            formStatus.style.display = 'block';
            console.error(error);
        });
    });
</script>

{% endblock %}
